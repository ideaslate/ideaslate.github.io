<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idea Slate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --ink-mid: #6b6b67;
      --ink-faint: #c8c8c2;
      --paper: #f9f8f5;
      --accent: #2e2e2c;
      --line: rgba(0,0,0,0.08);
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .rule {
      width: 40px;
      height: 1.5px;
      background: var(--ink);
      margin-bottom: 2rem;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    .wordmark em {
      font-style: italic;
      color: var(--ink-mid);
    }

    .tagline {
      font-size: 1rem;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.65;
      max-width: 360px;
      margin-bottom: 3rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin-bottom: 2rem;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .domain {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--ink-mid);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      letter-spacing: 0.02em;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f0efe9;
        --ink-mid: #9a9992;
        --ink-faint: #4a4a46;
        --paper: #141412;
        --line: rgba(255,255,255,0.08);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="rule" role="presentation"></div>
    <h1 class="wordmark">Idea&nbsp;<em>Slate</em></h1>
    <p class="tagline">A space where ideas take shape. Something is being built here — check back soon.</p>
    <div class="divider" role="presentation"></div>
    <div class="footer-row">
      <span class="domain">ideaSlate.com</span>
      <span class="badge">Coming soon</span>
    </div>
  </main>
</body>
</html>
